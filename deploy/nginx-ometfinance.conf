## HTTP-only template — certbot --nginx will rewrite this in-place
## to add the listen 443 + redirect block once a cert is issued.
server {
    listen 80;
    server_name ometfinance.com www.ometfinance.com;

    root /var/www/ometfinance/public;
    index index.php index.html;

    # Project image uploads are validated at 4MB; give nginx some headroom.
    client_max_body_size 8M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
